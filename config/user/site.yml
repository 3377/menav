# 默认配置（请勿直接修改）。
# 建议复制到 config/user/site.yml 并按需调整；用户配置采用“完全替换”策略，将覆盖默认配置。

# 网站基本信息
title: 辰星书签
description: 超哥的个人书签
author: drfyup
favicon: menav.svg
logo_text: Drfy

icons:
  # 站点卡片图标模式：
  # - favicon：自动根据 URL 加载站点 favicon（失败时回退到 Font Awesome 图标）
  # - manual：始终使用手动指定的 Font Awesome 图标（不发起外部请求）
  # 隐私提示：启用 favicon 模式会请求第三方服务以获取图标，可能将站点 URL 发送给服务商（详见 README“隐私说明”）。
  mode: favicon # 可选: favicon | manual（默认 favicon）

# 字体设置（source: google | system；请确保字体支持相应字重）
fonts:
  title:
    family: Poppins
    weight: 600
    source: google
  subtitle:
    family: Quicksand
    weight: 500
    source: google
  body:
    family: Noto Sans SC
    weight: 400
    source: google
    
# 个人资料：显示在首页顶部的欢迎信息
profile:
  title: Hello,
  subtitle: Welcome to Drfyup's bookmarks
  description: MeNav

# 首页配置：指定首页显示哪个书签文件夹的内容
homepage:
  # 从书签中动态提取指定路径的文件夹作为首页内容
  # 格式：["分类名", "子分类名", "分组名"] 
  # 示例：["", "收藏夹栏", "常用导航"] 表示显示 收藏夹栏>常用导航 这个文件夹的内容
  bookmarkFolder: ["", "收藏夹栏", "常用导航"]
  # 是否启用（true: 使用书签文件夹，false: 使用传统的 pages/home.yml 配置）
  enabled: true
  # 首页分类默认是否展开（true: 展开, false: 收起）
  defaultExpanded: true

# 多层级书签配置
bookmarks:
  # 跳过顶层空分类，直接显示下一层（true: 跳过, false: 不跳过）
  skipEmptyTopCategory: true
  
  # 默认展开的层级深度（从显示的第一层开始计算）
  # 0 = 全部收起
  # 1 = 展开第一层（例如：展开"收藏夹栏"显示下面的groups）
  # 2 = 展开到第二层（例如：展开groups显示里面的书签）
  # 用户手动切换的状态会保存在localStorage中，优先级更高
  defaultExpandDepth: 2

# 社交媒体链接：显示在侧边栏底部；可按需增删
social:
  - name: GitHub
    url: https://github.com/3377
    icon: fab fa-github
  - name: Telegram
    url: https://t.me/drfyup
    icon: fab fa-telegram
  - name: Twitter
    url: https://twitter.com/drfyup
    icon: fab fa-twitter
  - name: 流量商店-咨询信息流
    url: https://ll.sd
    icon: fab fa-steam

# 导航配置
navigation:
  - name: 首页        # 菜单名称
    icon: fas fa-home  # Font Awesome 图标类
    id: home           # 页面标识符（唯一，需与 pages/home.yml 对应）
    active: true       # 是否默认激活（全局仅一个 true）- 显示常用导航
  - name: 项目
    icon: fas fa-project-diagram
    id: projects
  - name: 文章
    icon: fas fa-book
    id: articles
  - name: 朋友
    icon: fas fa-users
    id: friends
  - name: 书签(多层级)
    icon: fas fa-bookmark
    id: bookmarks
